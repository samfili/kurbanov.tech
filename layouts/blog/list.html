{{ define "main" }}
<section class="blog-list">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}<div class="section-intro">{{ . }}</div>{{ end }}

  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
    <li>
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 Jan 2006" }}</time>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </li>
    {{ else }}
    <li class="empty">{{ if eq .Site.Language.Lang "ru" }}Пока ничего нет.{{ else }}Nothing here yet.{{ end }}</li>
    {{ end }}
  </ul>
</section>
{{ end }}
